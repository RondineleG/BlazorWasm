version: '3.8'

services:
  terminal:
    image: ghcr.io/rondineleg/mrbur-terminal:latest
    container_name: mrbur-terminal
    ports:
      - "1408:8080"
    environment:
      - Jwt__Secret=MrBurTerminalSecretKey2026!@#$%
      - Jwt__Issuer=MrBurTerminal
      - Jwt__ExpiryHours=24
      - Ssh__Host=172.245.152.43
      - Ssh__Username=root
      - Ssh__KeyPath=/root/.ssh/mrbur_deploy
      - Ssh__Port=22
    volumes:
      - ~/.ssh/mrbur_deploy:/root/.ssh/mrbur_deploy:ro
      - terminal-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  terminal-data: